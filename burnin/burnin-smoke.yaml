# KubeMQ Google Cloud Pub/Sub burn-in SMOKE config: short, low-rate run with
# STRICT integrity gates (zero loss, zero corruption, zero ordering violations,
# exactly-once fully reconciled, zero fan-out drop, interop convergence) but
# RELAXED latency / throughput (a cold local connector is slower than a warm
# soak). Use for CI / a quick green-path proof (~60s):
#   KUBEMQ_BROKER_ADDRESS=localhost:8085 go run . --config burnin-smoke.yaml --run

version: "2"

broker:
  address: "localhost:8085"
  grpc_address: "localhost:50000"
  client_id_prefix: "burnin-gcp-smoke"

mode: "smoke"
duration: "60s"
warmup_duration: "5s"

gcp:
  project_id: "burnin"
  emulator_host: ""
  ack_deadline_seconds: 10
  enable_message_ordering: false
  enable_exactly_once: false
  filter: ""
  dead_letter_topic: ""
  max_delivery_attempts: 5
  fanout_subscriptions: 2
  batch_size: 1
  # New data-plane worker knobs + probe toggles (spec S6.4).
  schema_type: "avro"
  schema_encoding: "json"
  nack_fraction: 0.25
  max_outstanding_bytes: 0
  inflight_backlog_target: 25000
  seek_replay_count: 500
  exactly_once_probe: true
  lease_extend_probe: true
  cross_stream_probe: true
  flow_control_probe: true
  retry_backoff_probe: false
  batch_atomicity_probe: true

workers:
  publish_pull_round_trip:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 2
    rate: 25
  streaming_pull:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 25
  ordering_keys:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 15
  exactly_once:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 15
  dead_letter:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 10
  fan_out:
    enabled: true
    channels: 1
    producers_per_channel: 1
    subscriptions: 2
    rate: 10
  cross_protocol_interop:
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 15
  nack_redelivery:                 # default-ON (smoke)
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 25
  filtering:                       # default-ON (smoke)
    enabled: true
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 25
  schema_enforce:                  # opt-in: OFF in smoke
    enabled: false
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 25
  seek_snapshot:                   # opt-in: OFF in smoke
    enabled: false
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 25
  inflight_cap:                    # opt-in: OFF in smoke
    enabled: false
    channels: 1
    producers_per_channel: 1
    consumers_per_channel: 1
    rate: 100

message:
  size_mode: "fixed"
  size_bytes: 512
  size_distribution: "256:80,4096:15,65536:5"
  reorder_window: 10000

metrics:
  port: 8899
  report_interval: "10s"

logging:
  format: "text"
  level: "info"

forced_disconnect:
  interval: "0"
  duration: "5s"

recovery:
  reconnect_interval: "1s"
  reconnect_max_interval: "30s"
  reconnect_multiplier: 2.0

shutdown:
  drain_timeout_seconds: 15

output:
  report_file: ""
  sdk_version: ""

# Strict integrity, relaxed latency/throughput for a cold local connector.
thresholds:
  max_loss_pct: 0.0
  max_duplication_pct: 2.0
  max_p50_latency_ms: 5000
  max_p95_latency_ms: 10000
  max_p99_latency_ms: 20000
  max_p999_latency_ms: 30000
  min_throughput_pct: 50
  max_error_rate_pct: 2.0
  max_memory_growth_factor: 3.0
  max_downtime_pct: 25
  max_duration: "168h"

warmup:
  max_parallel_channels: 10
  timeout_per_channel_ms: 5000

cors:
  origins: "*"
